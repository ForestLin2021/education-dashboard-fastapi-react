# Optional service — only powers the chat (/api/chat) feature. The dashboard
# itself (KPIs/charts/filters) is static JSON served by the Vercel frontend
# and does not call this service at all. See ../README.md.
services:
  - type: web
    name: epp-dashboard-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # 手動在 Render Dashboard 填入
    autoDeploy: true
