services:
  - type: web
    name: epp-dashboard-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # 手動在 Render Dashboard 填入
    autoDeploy: true
